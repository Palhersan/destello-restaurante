  <path d="M360 520 Q600 300 840 520" fill="none" stroke="#0b2447" stroke-width="24" stroke-linecap="round"/>
  <path d="M440 520 Q600 390 760 520" fill="none" stroke="#ffffff" stroke-width="12" opacity="0.7"/>
  <circle cx="390" cy="500" r="18" fill="#fff" opacity="0.65"/>
  <circle cx="810" cy="500" r="18" fill="#fff" opacity="0.65"/>
  <path d="M360 520 C 320 560 280 640 300 700" stroke="#0b2447" stroke-width="18" fill="none" stroke-linecap="round"/>
  <path d="M840 520 C 880 560 920 640 900 700" stroke="#0b2447" stroke-width="18" fill="none" stroke-linecap="round"/>
  <rect x="260" y="240" width="680" height="140" rx="20" fill="#f5f7fb"/>
  <line x1="280" y1="280" x2="900" y2="280" stroke="#c7d7eb" stroke-width="8"/>
  <path d="M920 380 L1060 320" stroke="#b0c9e5" stroke-width="18" stroke-linecap="round"/>
  <path d="M920 460 L1060 520" stroke="#b0c9e5" stroke-width="18" stroke-linecap="round"/>
