<svg width="1200" height="900" viewBox="0 0 1200 900" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="maskTitle maskDesc">
  <title id="maskTitle">Antifaz sensorial en mesa elegante</title>
  <desc id="maskDesc">Ilustración editorial de un antifaz azul marino sobre mantel blanco de lino con cubiertos plateados, tono minimalista y lujoso.</desc>
  <defs>
    <linearGradient id="canvas" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#e5eef8"/>
    </linearGradient>
    <linearGradient id="maskGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#022b56"/>
      <stop offset="100%" stop-color="#113d77"/>
    </linearGradient>
    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="20" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="1200" height="900" fill="url(#canvas)"/>
  <rect x="80" y="80" width="1040" height="740" rx="60" fill="#f8fbff" stroke="#c7d7eb" stroke-width="4"/>
